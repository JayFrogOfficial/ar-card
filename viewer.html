<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AR Card</title>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;width:100vw;height:100vh}
#ui{position:fixed;bottom:28px;left:0;right:0;display:flex;justify-content:center;z-index:10;pointer-events:none}
#status{padding:10px 22px;background:rgba(0,0,0,.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-family:-apple-system,sans-serif;font-size:14px;border-radius:24px;border:1px solid rgba(255,255,255,.12);transition:background .4s}
#status.ok{background:rgba(0,140,0,.7)}
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:18px}
.spin{width:40px;height:40px;border:3px solid #333;border-top-color:#FFD700;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#splash-name{color:#FFD700;font-family:-apple-system,sans-serif;font-size:22px;font-weight:700;display:none}
#splash-msg{color:#aaa;font-family:-apple-system,sans-serif;font-size:14px;text-align:center;max-width:260px;line-height:1.6}
#tap-btn{display:none;background:#FFD700;color:#000;border:none;border-radius:14px;padding:18px 44px;font-size:18px;font-weight:700;font-family:-apple-system,sans-serif;cursor:pointer}
</style>
</head>
<body>
<div id="splash">
  <div class="spin" id="spin"></div>
  <div id="splash-name"></div>
  <div id="splash-msg">Wird geladen...</div>
  <button id="tap-btn" onclick="startAR()">AR starten</button>
</div>
<div id="ui"><div id="status">Visitenkarte anvisieren...</div></div>
<script>
var SB='https://lzzfaoekhnggeixgumfg.supabase.co',BKT='ar-cards';
var CFG=null,mindBuf=null,started=false;
var id=new URLSearchParams(location.search).get('id');
function msg(t){document.getElementById('splash-msg').textContent=t;}
function showBtn(){document.getElementById('spin').style.display='none';document.getElementById('tap-btn').style.display='block';}
async function loadData(){
  if(!id){msg('Fehler: Keine ID.');return;}
  try{
    msg('Lade Kartendaten...');
    var [cr,mr]=await Promise.all([
      fetch(SB+'/storage/v1/object/public/'+BKT+'/'+id+'.json'),
      fetch(SB+'/storage/v1/object/public/'+BKT+'/'+id+'.mind')
    ]);
    if(!cr.ok)throw new Error('Config '+cr.status);
    if(!mr.ok)throw new Error('Mind '+mr.status);
    CFG=await cr.json();
    mindBuf=await mr.arrayBuffer();
    var n=document.getElementById('splash-name');
    n.textContent=CFG.name;n.style.display='block';
    msg('Tippe um die Kamera zu starten');
    showBtn();
  }catch(e){msg('Fehler: '+e.message);console.error(e);}
}
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}
function makeTex(text,opts){
  var o=Object.assign({w:512,h:128,sz:72,color:'#fff',bg:null,bold:true},opts||{});
  var c=document.createElement('canvas');c.width=o.w;c.height=o.h;
  var ctx=c.getContext('2d');
  if(o.bg){ctx.fillStyle=o.bg;rrect(ctx,2,2,o.w-4,o.h-4,18);ctx.fill();}
  ctx.fillStyle=o.color;
  ctx.font=(o.bold?'bold ':'')+o.sz+'px -apple-system,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,o.w/2,o.h/2);
  return new THREE.CanvasTexture(c);
}
function waitForMindAR(){
  return new Promise(function(resolve,reject){
    if(window.MINDAR&&window.MINDAR.IMAGE){resolve();return;}
    var t=setTimeout(function(){reject(new Error('MindAR Timeout - Seite neu laden'));},20000);
    var iv=setInterval(function(){
      if(window.MINDAR&&window.MINDAR.IMAGE){clearInterval(iv);clearTimeout(t);resolve();}
    },200);
  });
}
async function startAR(){
  if(started||!CFG||!mindBuf)return;
  started=true;
  document.getElementById('tap-btn').style.display='none';
  document.getElementById('splash-name').style.display='none';
  document.getElementById('spin').style.display='block';
  msg('Kamera startet...');
  try{
    await waitForMindAR();
    var T=window.THREE;
    var mindUrl=URL.createObjectURL(new Blob([mindBuf],{type:'application/octet-stream'}));
    var ar=new window.MINDAR.IMAGE.MindARThree({
      container:document.body,
      imageTargetSrc:mindUrl,
      uiLoading:'no',uiError:'no',uiScanning:'no'
    });
    var {renderer,scene,camera}=ar;
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    scene.add(new THREE.HemisphereLight(0xffffff,0x333333,2));
    var anchor=ar.addAnchor(0),g=anchor.group;

    var nm=new T.Mesh(
      new T.PlaneGeometry(0.22,0.044),
      new T.MeshBasicMaterial({map:makeTex(CFG.name,{w:1024,h:200,sz:110,color:'#FFD700'}),transparent:true,depthWrite:false}));
    nm.position.set(0,0.088,0.001);g.add(nm);

    if(CFG.subtitle){
      var sm=new T.Mesh(
        new T.PlaneGeometry(0.18,0.026),
        new T.MeshBasicMaterial({map:makeTex(CFG.subtitle,{w:800,h:110,sz:52,color:'#aaa',bold:false}),transparent:true,depthWrite:false}));
      sm.position.set(0,0.054,0.001);g.add(sm);
    }

    var BTNS=[
      {label:'Website',bg:'#111177',url:CFG.links.website},
      {label:'Spotify',bg:'#1DB954',url:CFG.links.spotify},
      {label:'Instagram',bg:'#C13584',url:CFG.links.instagram}
    ].filter(function(b){return b.url&&b.url.startsWith('http');});

    var clickables=[],bW=0.068,bH=0.02,gap=0.006;
    var tot=BTNS.length*bW+(BTNS.length-1)*gap;
    BTNS.forEach(function(b,i){
      var x=-tot/2+bW/2+i*(bW+gap);
      var m=new T.Mesh(
        new T.PlaneGeometry(bW,bH),
        new T.MeshBasicMaterial({map:makeTex(b.label,{w:512,h:148,sz:44,color:'#fff',bg:b.bg})}));
      m.position.set(x,0.018,0.001);m.userData.url=b.url;
      g.add(m);clickables.push(m);
    });

    var ray=new T.Raycaster();
    function onTap(e){
      var r=renderer.domElement.getBoundingClientRect();
      var cx=e.touches?e.changedTouches[0].clientX:e.clientX;
      var cy=e.touches?e.changedTouches[0].clientY:e.clientY;
      ray.setFromCamera({x:((cx-r.left)/r.width)*2-1,y:-((cy-r.top)/r.height)*2+1},camera);
      var h=ray.intersectObjects(clickables);
      if(h.length)window.open(h[0].object.userData.url,'_blank');
    }
    renderer.domElement.addEventListener('touchend',onTap);
    renderer.domElement.addEventListener('click',onTap);

    var st=document.getElementById('status');
    anchor.onTargetFound=function(){st.textContent='Karte erkannt!';st.classList.add('ok');};
    anchor.onTargetLost=function(){st.textContent='Visitenkarte anvisieren...';st.classList.remove('ok');};

    await ar.start();
    document.getElementById('splash').style.display='none';
    renderer.setAnimationLoop(function(){renderer.render(scene,camera);});
  }catch(e){
    msg('Fehler: '+e.message);
    document.getElementById('spin').style.display='none';
    console.error(e);
  }
}
loadData();
</script>
</body>
</html>
