<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>AR Card</title>

<!-- Import map: tells browser where to find "three" when MindAR imports it -->
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"}}
</script>

<!-- Load MindAR + Three.js as ES module, expose as globals -->
<script type="module">
import * as THREE from 'three';
import { MindARThree } from 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js';
window.THREE = THREE;
window.MINDAR = { IMAGE: { MindARThree } };
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;overflow:hidden;width:100%;height:100%}

/* MindAR container: fills viewport, hidden until AR starts */
#ar-container{
  position:fixed;inset:0;
  width:100%;height:100%;
  display:none;
}

#splash{
  position:fixed;inset:0;background:#000;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:100;gap:20px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}

.spin{
  width:44px;height:44px;
  border:3px solid #222;border-top-color:#FFD700;
  border-radius:50%;animation:sp .9s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}

#splash-name{
  color:#FFD700;
  font-family:-apple-system,sans-serif;
  font-size:26px;font-weight:700;
  display:none;text-align:center;
  padding:0 24px;
}
#splash-msg{
  color:#888;
  font-family:-apple-system,sans-serif;
  font-size:15px;text-align:center;
  max-width:280px;line-height:1.7;
}
#tap-hint{
  display:none;
  color:rgba(255,215,0,0.7);
  font-family:-apple-system,sans-serif;
  font-size:13px;letter-spacing:1px;
  text-transform:uppercase;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

#status{
  position:fixed;bottom:28px;left:0;right:0;
  display:flex;justify-content:center;
  z-index:200;pointer-events:none;
}
#status-text{
  padding:10px 22px;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:#fff;font-family:-apple-system,sans-serif;font-size:14px;
  border-radius:24px;border:1px solid rgba(255,255,255,.12);
  transition:background .4s;
}
#status-text.ok{background:rgba(0,140,0,.7)}
</style>
</head>
<body>

<div id="ar-container"></div>

<div id="splash" onclick="handleTap()">
  <div class="spin" id="spin"></div>
  <div id="splash-name"></div>
  <div id="splash-msg">Wird geladen...</div>
  <div id="tap-hint">Tippe irgendwo</div>
</div>

<div id="status"><div id="status-text">Visitenkarte anvisieren...</div></div>

<script>
// Patch 1: Force rear camera on every getUserMedia call
(function(){
  var _orig=navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
  navigator.mediaDevices.getUserMedia=function(c){
    if(c&&c.video){
      c.video=Object.assign(typeof c.video==='object'?c.video:{},{facingMode:'environment'});
    }
    return _orig(c);
  };
})();

// Patch 2: Any <video> MindAR creates gets playsinline + muted immediately,
// which is required for iOS Safari to display video inline.
(function(){
  var _origCE=document.createElement.bind(document);
  document.createElement=function(tag){
    var el=_origCE(tag);
    if(typeof tag==='string'&&tag.toLowerCase()==='video'){
      el.setAttribute('playsinline','');
      el.setAttribute('webkit-playsinline','');
      el.muted=true;
      el.autoplay=true;
    }
    return el;
  };
})();

var SB='https://lzzfaoekhnggeixgumfg.supabase.co',BKT='ar-cards';
var CFG=null,mindBuf=null,started=false,dataReady=false;
var id=new URLSearchParams(location.search).get('id');

function msg(t){document.getElementById('splash-msg').textContent=t;}

async function loadData(){
  if(!id){msg('Fehler: Keine ID in der URL.');return;}
  try{
    msg('Karte wird geladen...');
    var [cr,mr]=await Promise.all([
      fetch(SB+'/storage/v1/object/public/'+BKT+'/'+id+'.json'),
      fetch(SB+'/storage/v1/object/public/'+BKT+'/'+id+'.mind')
    ]);
    if(!cr.ok)throw new Error('Karte nicht gefunden ('+cr.status+')');
    if(!mr.ok)throw new Error('AR-Daten fehlen ('+mr.status+')');
    CFG=await cr.json();
    msg('AR-Daten werden verarbeitet...');
    mindBuf=await mr.arrayBuffer();
    var nm=document.getElementById('splash-name');
    nm.textContent=CFG.name;nm.style.display='block';
    document.getElementById('spin').style.display='none';
    msg('');
    document.getElementById('tap-hint').style.display='block';
    dataReady=true;
  }catch(e){
    msg('Fehler: '+e.message);
    document.getElementById('spin').style.display='none';
    console.error(e);
  }
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function makeTex(text,opts){
  var o=Object.assign({w:512,h:128,sz:72,color:'#fff',bg:null,bold:true},opts||{});
  var c=document.createElement('canvas');c.width=o.w;c.height=o.h;
  var ctx=c.getContext('2d');
  if(o.bg){ctx.fillStyle=o.bg;rrect(ctx,2,2,o.w-4,o.h-4,18);ctx.fill();}
  ctx.fillStyle=o.color;
  ctx.font=(o.bold?'bold ':'')+o.sz+'px -apple-system,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,o.w/2,o.h/2);
  return new window.THREE.CanvasTexture(c);
}

function handleTap(){
  if(!dataReady){return;}
  if(!window.MINDAR||!window.MINDAR.IMAGE){
    msg('AR-Bibliothek lädt noch, bitte warten...');return;
  }
  startAR();
}

async function startAR(){
  if(started)return;
  started=true;
  document.getElementById('tap-hint').style.display='none';
  document.getElementById('splash-name').style.display='none';
  document.getElementById('spin').style.display='block';
  msg('Kamera wird aktiviert...');
  try{
    // Grab camera permission while user-gesture token is fresh.
    // Keep stream open so iOS doesn't revoke the camera before MindAR starts.
    var camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    camStream.getTracks().forEach(function(t){t.stop();});
  }catch(e){
    msg('Kein Kamerazugriff: '+e.message);
    document.getElementById('spin').style.display='none';
    started=false;
    return;
  }
  msg('AR wird geladen...');
  try{
    var T=window.THREE;
    var container=document.getElementById('ar-container');
    container.style.display='block';

    var mindUrl=URL.createObjectURL(new Blob([mindBuf],{type:'application/octet-stream'}));
    var ar=new window.MINDAR.IMAGE.MindARThree({
      container:container,
      imageTargetSrc:mindUrl,
      uiLoading:'no',uiError:'no',uiScanning:'no'
    });
    var {renderer,scene,camera}=ar;
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    scene.add(new T.HemisphereLight(0xffffff,0x333333,2));
    var anchor=ar.addAnchor(0),g=anchor.group;

    var nm=new T.Mesh(
      new T.PlaneGeometry(3.0,0.6),
      new T.MeshBasicMaterial({map:makeTex(CFG.name,{w:1024,h:200,sz:140,color:'#FFD700'}),transparent:true,depthWrite:false}));
    nm.position.set(0,1.1,0.05);g.add(nm);

    if(CFG.subtitle){
      var sm=new T.Mesh(
        new T.PlaneGeometry(2.5,0.38),
        new T.MeshBasicMaterial({map:makeTex(CFG.subtitle,{w:800,h:120,sz:70,color:'#aaa',bold:false}),transparent:true,depthWrite:false}));
      sm.position.set(0,0.6,0.05);g.add(sm);
    }

    var BTNS=[
      {label:'Website',bg:'#111177',url:CFG.links&&CFG.links.website},
      {label:'Spotify',bg:'#1DB954',url:CFG.links&&CFG.links.spotify},
      {label:'Instagram',bg:'#C13584',url:CFG.links&&CFG.links.instagram}
    ].filter(function(b){return b.url&&b.url.startsWith('http');});

    var clickables=[],bW=0.85,bH=0.28,gap=0.1;
    var tot=BTNS.length*bW+(BTNS.length-1)*gap;
    BTNS.forEach(function(b,i){
      var x=-tot/2+bW/2+i*(bW+gap);
      var m=new T.Mesh(
        new T.PlaneGeometry(bW,bH),
        new T.MeshBasicMaterial({map:makeTex(b.label,{w:512,h:160,sz:60,color:'#fff',bg:b.bg})}));
      m.position.set(x,0.1,0.05);m.userData.url=b.url;
      g.add(m);clickables.push(m);
    });

    var ray=new T.Raycaster();
    function onTap(e){
      // Use full viewport dimensions — canvas always fills the screen
      var cx=e.touches?e.changedTouches[0].clientX:e.clientX;
      var cy=e.touches?e.changedTouches[0].clientY:e.clientY;
      ray.setFromCamera({x:(cx/window.innerWidth)*2-1,y:-(cy/window.innerHeight)*2+1},camera);
      var h=ray.intersectObjects(clickables);
      if(h.length)window.open(h[0].object.userData.url,'_blank');
    }
    renderer.domElement.addEventListener('touchend',onTap);
    renderer.domElement.addEventListener('click',onTap);

    var st=document.getElementById('status-text');
    anchor.onTargetFound=function(){st.textContent='Karte erkannt!';st.classList.add('ok');};
    anchor.onTargetLost=function(){st.textContent='Visitenkarte anvisieren...';st.classList.remove('ok');};

    await ar.start();

    // After start: ensure any video MindAR added is actually playing
    container.querySelectorAll('video').forEach(function(v){
      v.setAttribute('playsinline','');
      v.setAttribute('webkit-playsinline','');
      v.muted=true;
      if(v.paused)v.play().catch(function(){});
    });

    document.getElementById('splash').style.display='none';
    renderer.setAnimationLoop(function(){renderer.render(scene,camera);});
  }catch(e){
    msg('Fehler: '+e.message);
    document.getElementById('spin').style.display='none';
    document.getElementById('ar-container').style.display='none';
    started=false;
    console.error(e);
  }
}

loadData();
</script>
</body>
</html>
