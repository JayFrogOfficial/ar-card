const CFG={"name":"JAY FROG","subtitle":"","links":{"website":"","spotify":"","instagram":"https://www.instagram.com/jayfrog"}};

function b64url(b64){
  const bin=atob(b64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes]));
}
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}
function makeTex(text,opts){
  const{w=512,h=128,sz=72,color="#fff",bg=null,bold=true}=opts||{};
  const c=document.createElement("canvas");c.width=w;c.height=h;
  const ctx=c.getContext("2d");
  if(bg){ctx.fillStyle=bg;rrect(ctx,2,2,w-4,h-4,18);ctx.fill();}
  ctx.fillStyle=color;
  ctx.font=(bold?"bold ":"")+sz+"px -apple-system,SF Pro Display,sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText(text,w/2,h/2);
  return new THREE.CanvasTexture(c);
}
async function init(){
  const THREE=window.THREE;
  const ar=new window.MINDAR.IMAGE.MindARThree({
    container:document.body,imageTargetSrc:b64url(MIND_B64),
    uiLoading:"no",uiError:"no",uiScanning:"no",
  });
  const{renderer,scene,camera}=ar;
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  scene.add(new THREE.HemisphereLight(0xffffff,0x333333,2));
  const anchor=ar.addAnchor(0),g=anchor.group;

  // Name
  const nm=new THREE.Mesh(new THREE.PlaneGeometry(0.22,0.044),
    new THREE.MeshBasicMaterial({map:makeTex(CFG.name,{w:1024,h:200,sz:110,color:"#FFD700"}),transparent:true,depthWrite:false}));
  nm.position.set(0,0.088,0.001);g.add(nm);

  // Subtitle
  if(CFG.subtitle){
    const sm=new THREE.Mesh(new THREE.PlaneGeometry(0.18,0.026),
      new THREE.MeshBasicMaterial({map:makeTex(CFG.subtitle,{w:800,h:110,sz:52,color:"#aaa",bold:false}),transparent:true,depthWrite:false}));
    sm.position.set(0,0.054,0.001);g.add(sm);
  }

  // Buttons
  const BTNS=[{label:"🌐 Website",bg:"#111133",url:CFG.links.website},{label:"🎵 Spotify",bg:"#1DB954",url:CFG.links.spotify},{label:"📸 Instagram",bg:"#C13584",url:CFG.links.instagram}].filter(b=>b.url&&b.url.startsWith("http"));
  const clickables=[],bW=0.068,bH=0.02,gap=0.006,tot=BTNS.length*bW+(BTNS.length-1)*gap;
  BTNS.forEach((b,i)=>{
    const x=-tot/2+bW/2+i*(bW+gap);
    const m=new THREE.Mesh(new THREE.PlaneGeometry(bW,bH),new THREE.MeshBasicMaterial({map:makeTex(b.label,{w:512,h:148,sz:44,color:"#fff",bg:b.bg})}));
    m.position.set(x,0.018,0.001);m.userData.url=b.url;g.add(m);clickables.push(m);
  });

  // Tap → open link
  const ray=new THREE.Raycaster();
  function onTap(e){const r=renderer.domElement.getBoundingClientRect(),cx=e.touches?e.changedTouches[0].clientX:e.clientX,cy=e.touches?e.changedTouches[0].clientY:e.clientY;ray.setFromCamera({x:((cx-r.left)/r.width)*2-1,y:-((cy-r.top)/r.height)*2+1},camera);const h=ray.intersectObjects(clickables);if(h.length)window.open(h[0].object.userData.url,"_blank");}
  renderer.domElement.addEventListener("touchend",onTap);
  renderer.domElement.addEventListener("click",onTap);

  // Status
  const st=document.getElementById("status");
  anchor.onTargetFound=()=>{st.textContent="✓ Karte erkannt";st.classList.add("ok");};
  anchor.onTargetLost=()=>{st.textContent="Visitenkarte anvisieren…";st.classList.remove("ok");};

  document.getElementById("splash").style.display="none";
  await ar.start();
  renderer.setAnimationLoop(()=>renderer.render(scene,camera));
}
init().catch(e=>{document.querySelector("#splash p").textContent="Fehler: "+e.message;console.error(e);});
</script>
